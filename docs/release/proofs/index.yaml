schema_version: 1
scenarios:
  - id: proof:routed-build
    title: Routed Build
    category: doing-work
    command: './bin/circuit-next run --goal "develop: add a small safe change" --progress jsonl'
    expected_flow: build
    expected_outcome: complete or needs_attention
    summary_contract: Summary states selected work type, changes, verification, review, risk, and next action.
    redaction_policy: No secrets or untracked file contents in checked-in example.
    required_files:
      - examples/runs/routed-build/progress.jsonl
      - examples/runs/routed-build/operator-summary.md
      - examples/runs/routed-build/result.json
    status: release_blocker
    exception_ids: [EX-REL-011-GOLDEN-RUNS]
    readiness_refs: [REL-011]
  - id: proof:explicit-build
    title: Explicit Build
    category: doing-work
    command: ./bin/circuit-next run build --goal "add a focused change" --entry-mode deep --progress jsonl
    expected_flow: build
    expected_outcome: complete or checkpoint_waiting
    summary_contract: Summary explains explicit Build selection, checkpoint/verification state, and next action.
    redaction_policy: No project-private content beyond the synthetic fixture repo.
    required_files:
      - examples/runs/explicit-build/progress.jsonl
      - examples/runs/explicit-build/operator-summary.md
      - examples/runs/explicit-build/result.json
    status: release_blocker
    exception_ids: [EX-REL-011-GOLDEN-RUNS]
    readiness_refs: [REL-011]
  - id: proof:review
    title: Standalone Review
    category: doing-work
    command: ./bin/circuit-next run review --goal "review this change" --progress jsonl
    expected_flow: review
    expected_outcome: complete or needs_attention
    summary_contract: Summary lists review verdict, findings, evidence policy, and next action.
    redaction_policy: Untracked contents are excluded unless an explicit opt-in example is used.
    required_files:
      - examples/runs/review/progress.jsonl
      - examples/runs/review/operator-summary.md
      - examples/runs/review/result.json
    status: release_blocker
    exception_ids: [EX-REL-011-GOLDEN-RUNS]
    readiness_refs: [REL-005, REL-011]
  - id: proof:checkpoint-resume
    title: Checkpoint And Resume
    category: continuity
    command: ./bin/circuit-next run build --goal "deep change that asks for scope" --entry-mode deep --progress jsonl
    expected_flow: build
    expected_outcome: checkpoint_waiting then complete after resume
    summary_contract: Summary gives the checkpoint question, allowed choices, resume command, and final outcome.
    redaction_policy: Checkpoint files contain no private source snippets.
    required_files:
      - examples/runs/checkpoint/progress.jsonl
      - examples/runs/checkpoint/operator-summary.md
      - examples/runs/checkpoint/result.json
    status: release_blocker
    exception_ids: [EX-REL-011-GOLDEN-RUNS]
    readiness_refs: [REL-011]
  - id: proof:abort-failure
    title: Abort And Failure Summary
    category: failure
    command: ./bin/circuit-next run build --goal "simulate connector failure" --progress jsonl
    expected_flow: build
    expected_outcome: aborted
    summary_contract: Summary explains what failed, whether any files may have changed, and the exact next action.
    redaction_policy: Failure output is truncated and scrubbed.
    required_files:
      - examples/runs/abort/progress.jsonl
      - examples/runs/abort/operator-summary.md
      - examples/runs/abort/result.json
    status: release_blocker
    exception_ids: [EX-REL-011-GOLDEN-RUNS]
    readiness_refs: [REL-009, REL-011]
  - id: proof:fix
    title: Fix
    category: doing-work
    command: './bin/circuit-next run --goal "fix: restore the failing login test" --progress jsonl'
    expected_flow: fix
    expected_outcome: complete or needs_attention
    summary_contract: Summary shows repro/diagnosis, fix, verification, review policy, and next action.
    redaction_policy: Uses a synthetic bug fixture with no private data.
    required_files:
      - examples/runs/fix/progress.jsonl
      - examples/runs/fix/operator-summary.md
      - examples/runs/fix/result.json
    status: release_blocker
    exception_ids: [EX-REL-011-GOLDEN-RUNS]
    readiness_refs: [REL-011]
  - id: proof:migrate
    title: Migrate
    category: maintenance
    command: './bin/circuit-next run --goal "migrate: replace a small legacy API" --progress jsonl'
    expected_flow: migrate
    expected_outcome: complete or checkpoint_waiting
    summary_contract: Summary states inventory, coexistence plan, batch result, verification, review, and rollback risk.
    redaction_policy: Uses a synthetic migration fixture.
    required_files:
      - examples/runs/migrate/progress.jsonl
      - examples/runs/migrate/operator-summary.md
      - examples/runs/migrate/result.json
    status: release_blocker
    exception_ids: [EX-REL-011-GOLDEN-RUNS]
    readiness_refs: [REL-011]
  - id: proof:sweep
    title: Sweep
    category: maintenance
    command: './bin/circuit-next run --goal "cleanup: remove safe dead code" --progress jsonl'
    expected_flow: sweep
    expected_outcome: complete or needs_attention
    summary_contract: Summary states queue, executed items, deferred items, verification, and next action.
    redaction_policy: Uses a synthetic cleanup fixture.
    required_files:
      - examples/runs/sweep/progress.jsonl
      - examples/runs/sweep/operator-summary.md
      - examples/runs/sweep/result.json
    status: release_blocker
    exception_ids: [EX-REL-011-GOLDEN-RUNS]
    readiness_refs: [REL-011]
  - id: proof:explore-decision
    title: Explore Decision Or Tournament
    category: deciding
    command: './bin/circuit-next run --goal "decide: choose an architecture path" --progress jsonl'
    expected_flow: explore
    expected_outcome: complete or checkpoint_waiting
    summary_contract: Summary states options, decision, evidence, tradeoff, risk, and next action.
    redaction_policy: Uses non-sensitive architecture fixture text.
    required_files:
      - examples/runs/explore-decision/progress.jsonl
      - examples/runs/explore-decision/operator-summary.md
      - examples/runs/explore-decision/result.json
    status: release_blocker
    exception_ids: [EX-REL-011-GOLDEN-RUNS, EX-REL-004-MODE-MATRIX]
    readiness_refs: [REL-004, REL-011, REL-023]
  - id: proof:handoff
    title: Handoff Continuity
    category: continuity
    command: "/circuit:handoff resume"
    expected_outcome: resumed or clear blocked reason
    summary_contract: Summary explains saved state, next work, blockers, and resume/clear command.
    redaction_policy: Continuity payload excludes secrets and irrelevant chat history.
    required_files:
      - examples/runs/handoff/operator-summary.md
      - examples/runs/handoff/continuity.json
    status: release_blocker
    exception_ids: [EX-REL-011-GOLDEN-RUNS, EX-REL-014-HANDOFF-PARITY]
    readiness_refs: [REL-011, REL-014]
  - id: proof:customization
    title: Custom Creation Or Connector
    category: customization
    command: '/circuit:create "make a release note flow" or custom connector smoke'
    expected_outcome: draft_created, published, or connector complete
    summary_contract: Summary states what was created, validation result, publish/usage command, and next action.
    redaction_policy: Example uses temporary user config and synthetic prompt data.
    required_files:
      - examples/runs/customization/operator-summary.md
      - examples/runs/customization/result.json
    status: release_blocker
    exception_ids: [EX-REL-011-GOLDEN-RUNS, EX-REL-013-CREATE-PARITY]
    readiness_refs: [REL-011, REL-013]
  - id: proof:doctor-first-run
    title: Doctor First Run
    category: first-run
    command: ./bin/circuit-next doctor
    expected_outcome: pass or actionable failure
    summary_contract: Doctor explains install health, missing dependencies, supported host path, and next command.
    redaction_policy: Does not include local secrets or full environment dumps.
    required_files:
      - examples/runs/doctor/output.txt
    status: release_blocker
    exception_ids: [EX-REL-011-GOLDEN-RUNS]
    readiness_refs: [REL-017]
  - id: proof:plan-execution
    title: Plan Execution Campaign Start
    category: plan-execution
    command: './bin/circuit-next run --goal "Execute this plan: ./docs/public-release-readiness.md" --progress jsonl'
    expected_outcome: workflow start, checkpoint_waiting, or exact next command
    summary_contract: Summary identifies the first executable slice, selected flow, blocking decision, or exact next command.
    redaction_policy: Uses a scrubbed plan fixture if the live readiness doc contains local details.
    required_files:
      - examples/runs/plan-execution/progress.jsonl
      - examples/runs/plan-execution/operator-summary.md
      - examples/runs/plan-execution/result.json
    status: release_blocker
    exception_ids: [EX-REL-011-GOLDEN-RUNS, EX-REL-016-PLAN-EXECUTION]
    readiness_refs: [REL-011, REL-016]
